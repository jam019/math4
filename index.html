document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Math — Vivian's Move<\u002Ftitle>\n<style>\n  :root{\n    --bg:#FFFFFF;--ink:#1a1a1a;--muted:#5f5d57;\n    --line:#1a1a1a;--hair:#e2e0d8;\n    --accent:#c0562a;          /* pacer + progress */\n    --term:#a3461f;            /* vocabulary words  */\n    --dim:#c4c2bb;             /* dimmed text while pacing */\n    --focusbg:#fdeede;         /* active-sentence wash */\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  html{scroll-behavior:smooth}\n  body{background:var(--bg);color:var(--ink);font-family:Georgia,'Times New Roman',serif;line-height:1.75;padding:0 0 9rem;-webkit-font-smoothing:antialiased}\n  .wrap{max-width:880px;margin:0 auto;padding:0 1.6rem}\n\n  /* ---------- progress bar ---------- */\n  .progress-track{position:fixed;top:0;left:0;right:0;height:4px;background:transparent;z-index:60}\n  .progress{height:4px;background:var(--accent);width:0%;transition:width .2s ease}\n\n  /* ---------- top bar ---------- */\n  .r-bar{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid var(--line);\n    display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:.85rem 1.6rem;flex-wrap:wrap}\n  .bar-left{display:flex;flex-direction:row;align-items:center;gap:.7rem;min-width:0}\n  .bar-left .kicker{font-family:'Courier New',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}\n  .bar-left{position:relative}\n  .losc-pill{font-family:'Courier New',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:bold;padding:.34rem .8rem;border:1.5px solid var(--accent);background:#fff;color:var(--accent);border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:.45rem}\n  .losc-pill:hover{background:var(--accent);color:#fff}\n  .losc-pill .car{font-size:8px;transition:transform .15s ease}\n  .losc-pill.open .car{transform:rotate(180deg)}\n  .losc-pop{position:absolute;left:0;top:100%;margin-top:.55rem;width:min(440px,86vw);background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 40px rgba(0,0,0,.18);padding:1.1rem 1.2rem;z-index:80;display:none}\n  .losc-pop.open{display:block}\n  .losc-sec+.losc-sec{margin-top:1rem}\n  .losc-h{font-family:'Courier New',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:bold;color:var(--accent);margin-bottom:.4rem}\n  .losc-ed{font-size:1.05rem;line-height:1.45;outline:none;min-height:1.4em;color:var(--ink)}\n  .losc-ed:empty::before{content:attr(data-ph);color:#bdbbb2}\n  .bar-right{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap}\n  .pacer-btn{font-family:'Courier New',monospace;font-size:13px;letter-spacing:.08em;text-transform:uppercase;padding:.55rem 1.1rem;background:var(--accent);color:#fff;border:none;border-radius:999px;cursor:pointer}\n  .pacer-btn.off{background:#fff;color:var(--ink);border:1px solid var(--line)}\n  .linkbtn{font-family:'Courier New',monospace;font-size:13px;letter-spacing:.06em;text-transform:uppercase;padding:.55rem 1.1rem;background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:999px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem}\n  .linkbtn:hover{background:var(--hair)}\n  .navpill{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}\n  .navpill a{font-family:'Courier New',monospace;font-size:13px;letter-spacing:.06em;text-transform:uppercase;padding:.5rem 1rem;background:#fff;color:var(--ink);text-decoration:none;cursor:pointer}\n  .navpill a:hover{background:var(--hair)}\n  .navpill a.on{background:var(--ink);color:#fff;cursor:default}\n  .toggle{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}\n  .toggle button{font-family:'Courier New',monospace;font-size:14px;letter-spacing:.08em;padding:.5rem 1.1rem;background:#fff;border:none;cursor:pointer;color:var(--ink)}\n  .toggle button.on{background:var(--ink);color:#fff}\n\n  /* ---------- passage selector ---------- */\n  .psgnav{display:inline-flex;align-items:center;gap:.4rem;border:1px solid var(--line);border-radius:999px;padding:.2rem .35rem}\n  .psgnav button{width:34px;height:34px;border-radius:50%;border:none;background:#fff;cursor:pointer;font-size:18px;color:var(--ink);display:flex;align-items:center;justify-content:center}\n  .psgnav button:hover{background:var(--hair)}\n  .psgnav button:disabled{opacity:.3;cursor:default}\n  .psgname{font-family:'Courier New',monospace;font-size:12px;letter-spacing:.04em;min-width:138px;text-align:center;color:var(--ink);display:flex;flex-direction:column;line-height:1.3}\n  .psgname .pos{font-size:10px;letter-spacing:.14em;color:var(--muted)}\n\n  /* ---------- header ---------- */\n  .r-header{border-bottom:1px solid var(--line);padding:2.8rem 0 2.4rem;margin-bottom:1.2rem}\n  .eyebrow{font-family:'Courier New',monospace;font-size:14px;letter-spacing:.22em;text-transform:uppercase;color:var(--term);font-weight:bold;margin-bottom:1.1rem}\n  h1{font-size:clamp(2.6rem,6.5vw,4.2rem);line-height:1.08;font-weight:400;letter-spacing:-.01em}\n  h1 .hl{color:var(--accent)}\n  .lede{margin-top:1.2rem;color:var(--muted);font-size:1.5rem;font-style:italic;line-height:1.5}\n  .qpara .body{font-style:italic}\n\n  /* ---------- passages ---------- */\n  .psg{display:none}\n  .psg.active{display:block}\n\n  /* ---------- paragraphs ---------- */\n  .para{display:flex;gap:1.5rem;padding:2.1rem 0;border-bottom:1px solid var(--hair);\n    opacity:0;transform:translateY(26px);transition:opacity .7s ease,transform .7s ease}\n  .para.show{opacity:1;transform:none}\n  .num{flex:0 0 auto;font-family:'Courier New',monospace;font-size:16px;color:var(--accent);border:1px solid var(--accent);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;margin-top: .body p{font-size:1.5rem;line-height:1.7;margin:0 0 1rem}\n  .mathset .para .body p:last-child{margin-bottom:0}\n  .mathset .para .body ul{margin:.2rem 0 1rem 1.6rem;font-size:1.5rem;line-height:1.7}\n  .mathset .para .body li{margin:.5rem 0;padding-left:.3rem}\n  .subpart{display:flex;gap:.8rem;margin:1.6rem 0 0}\n  .subpart .let{flex:0 0 auto;font-weight:bold;font-size:1.5rem;line-height:1.7}\n  .subpart .subbody{flex:1;min-width:0}\n  .subpart .subbody p{margin:0}\n  .solline{display:flex;align-items:flex-end;gap:1rem;margin:1.3rem 0 .2rem}\n  .sollbl{font-family:'Courier New',monospace;font-size:13px;letter-spacing:.14em;font-weight:bold;color:var(--muted)}\n  .solrule{flex:1;border-bottom:1.5px solid var(--line);height:2.4rem}\n\n  /* ---------- figures ---------- */\n  .figure{width:fit-content;max-width:100%;margin:.4rem auto 2.4rem;border:1px solid var(--line);border-radius:16px;background:#fff;padding:.7rem;cursor:zoom-in;transition:box-shadow .2s ease,transform .2s ease}\n  .figure:hover{box-shadow:0 10px 26px rgba(0,0,0,.12);transform:translateY(-2px)}\n  .figure img{display:block;width:auto;max-width:100%;height:auto;max-height:340px;border-radius:10px;background:#fff}\n  .figcap{font-family:'Courier New',monospace;font-size:12px;letter-spacing:.05em;color:var(--muted);margin-top:.7rem;text-align:center}\n\n  /* ---------- lightbox (pop-out card) ---------- */\n  .lightbox{position:fixed;inset:0;z-index:120;display:none;align-items:center;justify-content:center;background:rgba(22,20,15,.6);padding:2rem}\n  .lightbox.open{display:flex}\n  .lightcard{position:relative;background:#fff;border:1px solid var(--line);border-radius:18px;padding:1rem;max-width:min(940px,94vw);max-height:92vh;box-shadow:0 30px 80px rgba(0,0,0,.45);display:flex;flex-direction:column;transform:scale(.88);opacity:0;transition:transform .3s cubic-bezier(.2,.9,.3,1.25),opacity .25s ease}\n  .lightbox.open .lightcard{transform:scale(1);opacity:1}\n  .lightcard img{display:block;max-width:100%;max-height:78vh;object-fit:contain;border-radius:10px}\n  .lightcard figcaption{font-family:'Courier New',monospace;font-size:13px;letter-spacing:.05em;color:var(--muted);text-align:center;margin-top:.9rem}\n  .lightclose{position:absolute;top:-16px;right:-16px;width:42px;height:42px;border-radius:50%;background:var(--ink);color:#fff;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.3)}\n\n  /* ---------- vocabulary popover ---------- */\n  .pop{position:absolute;z-index:90;max-width:400px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:1.2rem 1.4rem;box-shadow:0 14px 36px rgba(0,0,0,.18);font-family:Georgia,serif;font-size:1.3rem;line-height:1.5;display:none}\n  .pop .word{font-family:'Courier New',monospace;font-size:13px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.5rem;color:var(--term)}\n  .pop .x{float:right;cursor:pointer;color:var(--muted);font-family:sans-serif;margin-left:.6rem;font-size:1.2rem;line-height:1}\n\n  /* ---------- focus + motion polish ---------- */\n  .pacer-btn:focus-visible,.read-q:focus-visible,.pacedock button:focus-visible,.term:focus-visible,.pop .x:focus-visible,.psgnav button:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:8px}\n  .toggle button:focus-visible{outline:2px solid var(--accent);outline-offset:-3px}\n  h1,.read-q{text-wrap:balance}\n  .lede,.para .body{text-wrap:pretty}\n  @media (prefers-reduced-motion: reduce){\n    *{animation-duration:.001ms !important;transition-duration:.001ms !important}\n    html{scroll-behavior:auto !important}\n    .para{opacity:1 !important;transform:none !important}\n  }\n  @media(max-width:620px){\n    .para .body{font-size:1.5rem}\n    .num{width:38px;height:38px;font-size:14px}\n    .r-bar{padding:.7rem 1rem}\n    .psgname{min-width:108px}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body class=\"lang-en\">\n\n  \n\n  <div class=\"progress-track\"><div class=\"progress\" id=\"prog\"><\u002Fdiv><\u002Fdiv>\n\n  <!-- ===================== TOP BAR ===================== -->\n  <div class=\"r-bar\">\n    <div class=\"bar-left\">\n      <span class=\"kicker\"><span class=\"en\">Math · Vivian's Move<\u002Fspan><span class=\"es\">Matemáticas · Vivian's Move<\u002Fspan><\u002Fspan>\n      <button class=\"losc-pill\" id=\"loscPill\" onclick=\"toggleLOSC()\" aria-expanded=\"false\">LOSC <span class=\"car\">▾<\u002Fspan><\u002Fbutton>\n      <div class=\"losc-pop\" id=\"loscPop\">\n        <div class=\"losc-sec\">\n          <div class=\"losc-h\"><span class=\"en\">Learning Objective<\u002Fspan><span class=\"es\">Objetivo de aprendizaje<\u002Fspan><\u002Fdiv>\n          <div class=\"losc-ed\"><span class=\"en\">SWBAT read “Vivian’s Move” and use the details of Vivian’s cross-country trip to calculate unit rates, compare two rates, convert between miles and kilometers, and solve a percent problem, correctly solving all 4 problems and showing their work.<\u002Fspan><span class=\"es\">Los estudiantes podrán leer “Vivian’s Move” y usar los detalles del viaje de Vivian por el país para calcular tasas unitarias, comparar dos tasas, convertir entre millas y kilómetros y resolver un problema de porcentaje, resolviendo correctamente los 4 problemas y mostrando su trabajo.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"losc-sec\">\n          <div class=\"losc-h\"><span class=\"en\">Success Criteria<\u002Fspan><span class=\"es\">Criterios de logro<\u002Fspan><\u002Fdiv>\n          <div class=\"losc-ed\"><span class=\"en\">I am successful when I can: (1) restate one detail from “Vivian’s Move” in my own words; (2) set up each rate as a fraction with its units; (3) show every step of my work; and (4) label each final answer with correct units (mi/h, mi, or %).<\u002Fspan><span class=\"es\">Tengo éxito cuando puedo: (1) reformular un detalle de “Vivian’s Move” con mis propias palabras; (2) plantear cada tasa como una fracción con sus unidades; (3) mostrar cada paso de mi trabajo; y (4) etiquetar cada respuesta final con las unidades correctas (mi/h, mi o %).<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"bar-right\">\n      <div class=\"psgnav\" role=\"group\" aria-label=\"Passage selector\">\n        <button id=\"psgprev\" onclick=\"prevPassage()\" aria-label=\"Previous passage\">‹<\u002Fbutton>\n        <span class=\"psgname\" id=\"psgname\"><\u002Fspan>\n        <button id=\"psgnext\" onclick=\"nextPassage()\" aria-label=\"Next passage\">›<\u002Fbutton>\n      <\u002Fdiv>\n      <button id=\"pacertoggle\" class=\"pacer-btn off\" onclick=\"togglePacer()\">▸ <span class=\"en\">Reading Pacer<\u002Fspan><span class=\"es\">Marcapasos<\u002Fspan><\u002Fbutton>\n      <div class=\"toggle\" role=\"group\" aria-label=\"Language\">\n        <button id=\"btn-en\" class=\"on\" onclick=\"setLang('en')\">EN<\u002Fbutton>\n        <button id=\"btn-es\" onclick=\"setLang('es')\">ES<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"wrap\">\n\n    <!-- ============================================================= -->\n    <!-- PASSAGE 1 — PHYSICAL EROSION                                   -->\n    <!-- ============================================================= -->\n    <section class=\"psg active\" data-id=\"vivian\">\n      <div class=\"r-header\">\n        <div class=\"eyebrow\"><span class=\"en\">Literacy Connection · Realistic Fiction<\u002Fspan><span class=\"es\">Conexión literaria · Ficción realista<\u002Fspan><\u002Fdiv>\n        <h1>\n          <span class=\"en\">Vivian’s <span class=\"hl\">Move<\u002Fspan><\u002Fspan>\n          <span class=\"es\">La mudanza de <span class=\"hl\">Vivian<\u002Fspan><\u002Fspan>\n        <\u002Fh1>\n        <div class=\"lede\"><span class=\"en\">by Miguel Pereira<\u002Fspan><span class=\"es\">por Miguel Pereira<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"passage\">\n        <div class=\"para\">\n          <div class=\"num\">1<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">On a gray, rainy morning, Vivian waved goodbye to the red door she had walked through for the last time.<\u002Fspan> <span class=\"s\">She waved goodbye to her bus stop, which looked lonely in the rain.<\u002Fspan> <span class=\"s\">She waved goodbye to her favorite bakery, the grocery store, and the neighborhood softball field, which was a swirl of cold, brown mud.<\u002Fspan> <span class=\"s\">She waved goodbye to the frozen Charles River, and a tear fell down her face as she watched Boston vanish in the rearview mirror of the truck they had rented to move their lives across the country.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">En una mañana gris y lluviosa, Vivian se despidió con la mano de la puerta roja por la que había pasado por última vez.<\u002Fspan> <span class=\"s\">Se despidió de su parada de autobús, que se veía solitaria bajo la lluvia.<\u002Fspan> <span class=\"s\">Se despidió de su panadería favorita, del supermercado y del campo de softbol del vecindario, que era un remolino de lodo frío y marrón.<\u002Fspan> <span class=\"s\">Se despidió del río Charles congelado, y una lágrima rodó por su rostro mientras veía a Boston desvanecerse en el espejo retrovisor del camión que habían alquilado para mudar sus vidas al otro lado del país.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">2<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">Vivian had known for over six months that she was going to move to San Francisco, but she didn’t want to believe it.<\u002Fspan> <span class=\"s\">Boston had been her home since she was born; it was all she knew, and she loved it.<\u002Fspan> <span class=\"s\">After all, Boston had the best Italian food, beautiful buildings, subways, and—most importantly—her friends.<\u002Fspan> <span class=\"s\">What would she do in a new city without her friends?<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Vivian sabía desde hacía más de seis meses que se mudaría a San Francisco, pero no quería creerlo.<\u002Fspan> <span class=\"s\">Boston había sido su hogar desde que nació; era todo lo que conocía, y lo amaba.<\u002Fspan> <span class=\"s\">Después de todo, Boston tenía la mejor comida italiana, edificios hermosos, metros y—lo más importante—sus amigos.<\u002Fspan> <span class=\"s\">¿Qué haría en una ciudad nueva sin sus amigos?<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">3<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">For the past couple of months, Vivian and her dad had been reading about San Francisco and California.<\u002Fspan> <span class=\"s\">He wanted her to be excited, but she didn’t care that San Francisco was on a beautiful bay with scenic hills.<\u002Fspan> <span class=\"s\">She didn’t care that the city was known for having some of the best food in the world.<\u002Fspan> <span class=\"s\">She didn’t care about the spectacular Golden Gate Bridge and the warmer winters.<\u002Fspan> <span class=\"s\">Boston was beautiful and had wonderful restaurants, and she adored the fall leaves and the snowy winters.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Durante los últimos meses, Vivian y su papá habían estado leyendo sobre San Francisco y California.<\u002Fspan> <span class=\"s\">Él quería que se entusiasmara, pero a ella no le importaba que San Francisco estuviera sobre una hermosa bahía con colinas pintorescas.<\u002Fspan> <span class=\"s\">No le importaba que la ciudad fuera conocida por tener algunas de las mejores comidas del mundo.<\u002Fspan> <span class=\"s\">No le importaba el espectacular puente Golden Gate ni los inviernos más cálidos.<\u002Fspan> <span class=\"s\">Boston era hermosa y tenía restaurantes maravillosos, y ella adoraba las hojas de otoño y los inviernos nevados.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">4<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">Vivian and her dad took two and a half weeks to drive to San Francisco.<\u002Fspan> <span class=\"s\">By the time they crossed the California state line, they had driven through twelve states, four mountain ranges, three national parks, and countless cities and towns.<\u002Fspan> <span class=\"s\">Vivian felt exhausted from the long trip, and now she had to face the reality of why she was on the trip in the first place: California was her new home.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Vivian y su papá tardaron dos semanas y media en conducir hasta San Francisco.<\u002Fspan> <span class=\"s\">Para cuando cruzaron la frontera estatal de California, habían recorrido doce estados, cuatro cordilleras, tres parques nacionales e incontables ciudades y pueblos.<\u002Fspan> <span class=\"s\">Vivian se sentía agotada por el largo viaje, y ahora tenía que enfrentar la realidad de por qué estaba en el viaje en primer lugar: California era su nuevo hogar.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">5<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">The book that said San Francisco is hilly was right.<\u002Fspan> <span class=\"s\">Vivian thought that “hilly” was an understatement.<\u002Fspan> <span class=\"s\">She felt like she was on a roller coaster as they drove through the steep hills of the city.<\u002Fspan> <span class=\"s\">She thought it was too bad that San Francisco didn’t get snow like Boston does.<\u002Fspan> <span class=\"s\">These hills would be amazing for sledding!<\u002Fspan> <span class=\"s\">On the other hand, she thought about how much more fun the double-seated bike that she and her dad rode around Boston would be on these hills—at least going down!<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">El libro que decía que San Francisco es montañoso tenía razón.<\u002Fspan> <span class=\"s\">Vivian pensó que “montañoso” se quedaba corto.<\u002Fspan> <span class=\"s\">Se sentía como en una montaña rusa mientras conducían por las empinadas colinas de la ciudad.<\u002Fspan> <span class=\"s\">Pensó que era una lástima que en San Francisco no nevara como en Boston.<\u002Fspan> <span class=\"s\">¡Estas colinas serían increíbles para deslizarse en trineo!<\u002Fspan> <span class=\"s\">Por otro lado, pensó en lo mucho más divertida que sería en estas colinas la bicicleta de dos asientos que ella y su papá paseaban por Boston—¡al menos cuesta abajo!<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">6<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">After driving around for a while, Vivian’s dad stopped the truck at the top of a hill in front of a house with a pink door.<\u002Fspan> <span class=\"s\">Her dad wasn’t particularly excited about the bubble-gum-colored entrance, but Vivian was thrilled.<\u002Fspan> <span class=\"s\">The red door on their house in Boston suddenly didn’t feel so far away.<\u002Fspan> <span class=\"s\">She ran through the door, up the stairs, and into the second room on the right, just like her dad had explained.<\u002Fspan> <span class=\"s\">This was her room, and it was perfect.<\u002Fspan> <span class=\"s\">It had blue walls, a slanted ceiling, and a circle window that looked out on the street.<\u002Fspan> <span class=\"s\">The movers already had set up her bed in the room.<\u002Fspan> <span class=\"s\">San Francisco was starting to feel more like home every minute.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Después de conducir un rato, el papá de Vivian detuvo el camión en la cima de una colina frente a una casa con una puerta rosada.<\u002Fspan> <span class=\"s\">A su papá no le entusiasmaba mucho la entrada de color chicle, pero Vivian estaba encantada.<\u002Fspan> <span class=\"s\">La puerta roja de su casa en Boston de repente no se sentía tan lejana.<\u002Fspan> <span class=\"s\">Corrió por la puerta, subió las escaleras y entró en la segunda habitación a la derecha, tal como su papá le había explicado.<\u002Fspan> <span class=\"s\">Esta era su habitación, y era perfecta.<\u002Fspan> <span class=\"s\">Tenía paredes azules, un techo inclinado y una ventana circular que daba a la calle.<\u002Fspan> <span class=\"s\">Los de la mudanza ya habían armado su cama en la habitación.<\u002Fspan> <span class=\"s\">San Francisco empezaba a sentirse más como un hogar cada minuto.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">7<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">Vivian and her dad left their new house after several hours of unpacking to find somewhere to eat dinner.<\u002Fspan> <span class=\"s\">They found themselves in a part of town called North Beach.<\u002Fspan> <span class=\"s\">Vivian smiled when she saw restaurants with names like Mama Mia and Mangia Bene, and red, white, and green flags hanging in the windows.<\u002Fspan> <span class=\"s\">She was delighted to smell the delicious aromas floating in the air.<\u002Fspan> <span class=\"s\">She recognized that this was the Italian section of town and couldn’t believe how similar it was to the North End in Boston.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Vivian y su papá salieron de su nueva casa después de varias horas desempacando para buscar un lugar donde cenar.<\u002Fspan> <span class=\"s\">Se encontraron en una parte de la ciudad llamada North Beach.<\u002Fspan> <span class=\"s\">Vivian sonrió cuando vio restaurantes con nombres como Mama Mia y Mangia Bene, y banderas rojas, blancas y verdes colgando en las ventanas.<\u002Fspan> <span class=\"s\">Le encantó oler los deliciosos aromas que flotaban en el aire.<\u002Fspan> <span class=\"s\">Reconoció que esta era la sección italiana de la ciudad y no podía creer lo parecida que era al North End de Boston.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">8<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">Before going home, Vivian and her dad decided to take a trolley car to a nearby beach.<\u002Fspan> <span class=\"s\">They wanted to watch the sun set on their first day in San Francisco.<\u002Fspan> <span class=\"s\">When Vivian stepped off the trolley, she saw the waves lapping onto the beach in front of the silhouette of the Golden Gate Bridge.<\u002Fspan> <span class=\"s\">She wondered if it were possible for San Francisco to be as wonderful as Boston.<\u002Fspan> <span class=\"s\">So far, San Francisco was pretty great.<\u002Fspan> <span class=\"s\">She let out a sigh as she watched the sun turn colors and fade away.<\u002Fspan> <span class=\"s\">She thought about how her friends in Boston were probably asleep, and she wondered what new friends she would meet in San Francisco.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Antes de volver a casa, Vivian y su papá decidieron tomar un tranvía hacia una playa cercana.<\u002Fspan> <span class=\"s\">Querían ver la puesta de sol en su primer día en San Francisco.<\u002Fspan> <span class=\"s\">Cuando Vivian bajó del tranvía, vio las olas lamiendo la playa frente a la silueta del puente Golden Gate.<\u002Fspan> <span class=\"s\">Se preguntó si sería posible que San Francisco fuera tan maravilloso como Boston.<\u002Fspan> <span class=\"s\">Hasta ahora, San Francisco era bastante genial.<\u002Fspan> <span class=\"s\">Soltó un suspiro mientras veía al sol cambiar de colores y desvanecerse.<\u002Fspan> <span class=\"s\">Pensó en cómo sus amigos en Boston probablemente estaban dormidos, y se preguntó qué nuevos amigos conocería en San Francisco.<\u002Fspan><\u002Fspan>\n            <figure class=\"figure\" onclick=\"openLight(this)\" tabindex=\"0\" role=\"button\" aria-label=\"Enlarge image\">\n              <img src=\"db811c66-dcc0-4cb3-b605-fd8029d6d2e2\" alt=\"The Golden Gate Bridge at sunset, seen from a beach with a single bird at the water's edge.\">\n              <figcaption class=\"figcap\"><span class=\"en\">The Golden Gate Bridge at sunset.<\u002Fspan><span class=\"es\">El puente Golden Gate al atardecer.<\u002Fspan><\u002Ffigcaption>\n            <\u002Ffigure>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============================================================= -->\n    <!-- PASSAGE 2 — MATH LITERACY CONNECTION (display only)            -->\n    <!-- ============================================================= -->\n    <section class=\"psg\" data-id=\"math\">\n      <div class=\"r-header\">\n        <div class=\"eyebrow\"><span class=\"en\">Math Literacy Connection · Unit 4<\u002Fspan><span class=\"es\">Conexión matemática · Unidad 4<\u002Fspan><\u002Fdiv>\n        <h1>\n          <span class=\"en\">Vivian’s <span class=\"hl\">Move<\u002Fspan><\u002Fspan>\n          <span class=\"es\">La mudanza de <span class=\"hl\">Vivian<\u002Fspan><\u002Fspan>\n        <\u002Fh1>\n        <div class=\"lede\"><span class=\"en\">Unit Rates and Percent<\u002Fspan><span class=\"es\">Tasas unitarias y porcentaje<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"passage mathset\">\n        <p class=\"m-instr\"><span class=\"arw\">➤<\u002Fspan> <strong><span class=\"en\">Solve each problem. Show your work.<\u002Fspan><span class=\"es\">Resuelve cada problema. Muestra tu trabajo.<\u002Fspan><\u002Fstrong><\u002Fp>\n\n        <div class=\"para\">\n          <div class=\"num\">1<\u002Fdiv>\n          <div class=\"body\">\n            <p><span class=\"en\">Vivian and her dad drive from Boston to Niagara Falls. It takes them 9 hours to drive 495 miles.<\u002Fspan><span class=\"es\">Vivian y su papá conducen de Boston a las cataratas del Niágara. Tardan 9 horas en recorrer 495 millas.<\u002Fspan><\u002Fp>\n            <div class=\"subpart\">\n              <span class=\"let\">a.<\u002Fspan>\n              <div class=\"subbody\">\n                <p><span class=\"en\">What is their driving rate in miles per hour? Show your work.<\u002Fspan><span class=\"es\">¿Cuál es su tasa de conducción en millas por hora? Muestra tu trabajo.<\u002Fspan><\u002Fp>\n                <div class=\"solline\"><span class=\"sollbl\"><span class=\"en\">SOLUTION<\u002Fspan><span class=\"es\">SOLUCIÓN<\u002Fspan><\u002Fspan><span class=\"solrule\"><\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"subpart\">\n              <span class=\"let\">b.<\u002Fspan>\n              <div class=\"subbody\">\n                <p><span class=\"en\">Next, Vivian and her dad drive 4 hours to the Rock and Roll Hall of Fame in Cleveland, Ohio. If they drive at the same rate, how far do they travel? Show your work.<\u002Fspan><span class=\"es\">Luego, Vivian y su papá conducen 4 horas hasta el Salón de la Fama del Rock and Roll en Cleveland, Ohio. Si conducen a la misma tasa, ¿qué distancia recorren? Muestra tu trabajo.<\u002Fspan><\u002Fp>\n                <div class=\"solline\"><span class=\"sollbl\"><span class=\"en\">SOLUTION<\u002Fspan><span class=\"es\">SOLUCIÓN<\u002Fspan><\u002Fspan><span class=\"solrule\"><\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">2<\u002Fdiv>\n          <div class=\"body\">\n            <p><span class=\"en\">Vivian and her dad visit Yellowstone National Park and then Arches National Park. It takes them 30 hours to drive the 1,770 miles from Cleveland to Yellowstone. It takes them another 9 hours to drive the 558 miles from Yellowstone to Arches. Did they travel faster on their way to Yellowstone or on their way to Arches? Show your work.<\u002Fspan><span class=\"es\">Vivian y su papá visitan el Parque Nacional Yellowstone y luego el Parque Nacional Arches. Tardan 30 horas en recorrer las 1,770 millas de Cleveland a Yellowstone. Tardan otras 9 horas en recorrer las 558 millas de Yellowstone a Arches. ¿Viajaron más rápido camino a Yellowstone o camino a Arches? Muestra tu trabajo.<\u002Fspan><\u002Fp>\n            <div class=\"solline\"><span class=\"sollbl\"><span class=\"en\">SOLUTION<\u002Fspan><span class=\"es\">SOLUCIÓN<\u002Fspan><\u002Fspan><span class=\"solrule\"><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">3<\u002Fdiv>\n          <div class=\"body\">\n            <p><span class=\"en\">Vivian and her dad hike to Delicate Arch in Arches National Park. It takes them 90 minutes to hike 4.8 kilometers. What is their hiking rate in miles per hour? Show your work. (For every 10 miles, there are about 16 kilometers.)<\u002Fspan><span class=\"es\">Vivian y su papá caminan hasta Delicate Arch en el Parque Nacional Arches. Tardan 90 minutos en caminar 4.8 kilómetros. ¿Cuál es su tasa de caminata en millas por hora? Muestra tu trabajo. (Por cada 10 millas, hay aproximadamente 16 kilómetros.)<\u002Fspan><\u002Fp>\n            <div class=\"solline\"><span class=\"sollbl\"><span class=\"en\">SOLUTION<\u002Fspan><span class=\"es\">SOLUCIÓN<\u002Fspan><\u002Fspan><span class=\"solrule\"><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">4<\u002Fdiv>\n          <div class=\"body\">\n            <p><span class=\"en\">Vivian and her dad are driving from Arches National Park to San Francisco. They drive 240 miles, then stop for fuel. The place they stop is 25% of the distance from Arches National Park to San Francisco. What is the distance from Arches National Park to San Francisco? Show your work.<\u002Fspan><span class=\"es\">Vivian y su papá conducen del Parque Nacional Arches a San Francisco. Conducen 240 millas y luego se detienen a cargar combustible. El lugar donde se detienen está al 25% de la distancia entre el Parque Nacional Arches y San Francisco. ¿Cuál es la distancia entre el Parque Nacional Arches y San Francisco? Muestra tu trabajo.<\u002Fspan><\u002Fp>\n            <div class=\"solline\"><span class=\"sollbl\"><span class=\"en\">SOLUTION<\u002Fspan><span class=\"es\">SOLUCIÓN<\u002Fspan><\u002Fspan><span class=\"solrule\"><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv><!-- /wrap -->\n\n  <!-- ===================== PACER DOCK ===================== -->\n  <div class=\"pacedock\" aria-label=\"Reading pacer controls\">\n    <button id=\"pprev\" onclick=\"pacePrev()\" aria-label=\"Previous sentence\">‹<\u002Fbutton>\n    <span class=\"pcount\" id=\"pcount\">1 / 1<\u002Fspan>\n    <button id=\"pnext\" class=\"main\" onclick=\"paceNext()\" aria-label=\"Next sentence\">›<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- ===================== VOCAB POPOVER ===================== -->\n  <div class=\"pop\" id=\"pop\"><\u002Fdiv>\n\n  <!-- ===================== IMAGE LIGHTBOX ===================== -->\n  <div class=\"lightbox\" id=\"lightbox\" onclick=\"if(event.target===this)closeLight()\">\n    <figure class=\"lightcard\">\n      <button class=\"lightclose\" onclick=\"closeLight()\" aria-label=\"Close\">✕<\u002Fbutton>\n      <img id=\"lightimg\" alt=\"\">\n      <figcaption id=\"lightcap\"><\u002Ffigcaption>\n    <\u002Ffigure>\n  <\u002Fdiv>\n\n<script>\n/* ===================== VOCABULARY GLOSSARY ===================== */\nvar GLOSS={};\n\n/* ===================== PASSAGES ===================== */\nvar PASSAGES=[\n  {en:'Reading: Vivian\\'s Move', es:'Lectura: Vivian\\'s Move'},\n  {en:'Math Connection',    es:'Conexión matemática'}\n];\nvar ACTIVE=0;\n\n/* ===================== STATE ===================== */\nvar lang='en';\nvar pacerOn=false;\nvar idx=0;\nvar sentences=[];\n\n/* ===================== PASSAGE SWITCHING ===================== */\nfunction updatePsgName(){\n  var p=PASSAGES[ACTIVE];\n  document.getElementById('psgname').innerHTML=\n    '<span class=\"en\">'+p.en+'<\u002Fspan><span class=\"es\">'+p.es+'<\u002Fspan>'+\n    '<span class=\"pos\">'+(ACTIVE+1)+' / '+PASSAGES.length+'<\u002Fspan>';\n  document.getElementById('psgprev').disabled = ACTIVE===0;\n  document.getElementById('psgnext').disabled = ACTIVE===PASSAGES.length-1;\n}\nfunction setPassage(i){\n  if(i<0||i>=PASSAGES.length) return;\n  ACTIVE=i;\n  var secs=document.querySelectorAll('.psg');\n  for(var k=0;k<secs.length;k++){ secs[k].classList.toggle('active',k===i); }\n  document.querySelectorAll('.psg.active .para').forEach(function(el){el.classList.add('show');});\n  hidePop();\n  updatePsgName();\n  syncPacerAvailability();\n  window.scrollTo({top:0,behavior:'auto'});\n  if(pacerOn){ rebuildSentences(); idx=0; applyPace(); }\n  else { document.querySelectorAll('.s').forEach(function(s){s.classList.remove('active','done');}); }\n}\n\n/* hide the Reading Pacer on passages that have no prose to pace (e.g. Math Connection) */\nfunction activeHasSentences(){\n  return document.querySelectorAll('.psg.active .para .body > .en > .s, .psg.active .para .body > .es > .s').length>0;\n}\nfunction syncPacerAvailability(){\n  var btn=document.getElementById('pacertoggle');\n  if(!btn) return;\n  if(activeHasSentences()){\n    btn.style.display='';\n  }else{\n    if(pacerOn) togglePacer();   // turn it off before hiding\n    btn.style.display='none';\n  }\n}\nfunction nextPassage(){ setPassage(ACTIVE+1); }\nfunction prevPassage(){ setPassage(ACTIVE-1); }\n\n/* ===================== LANGUAGE ===================== */\nfunction setLang(l){\n  lang=l;\n  document.body.classList.toggle('lang-es',l==='es');\n  document.body.classList.toggle('lang-en',l!=='es');\n  document.getElementById('btn-en').classList.toggle('on',l==='en');\n  document.getElementById('btn-es').classList.toggle('on',l==='es');\n  updatePsgName();\n  updateLightCaption();\n  hidePop();\n  if(pacerOn){ rebuildSentences(); idx=Math.min(idx,sentences.length-1); applyPace(); }\n}\n\n/* ===================== READING PACER ===================== */\nfunction rebuildSentences(){\n  var langSel = lang==='es' ? '.es' : '.en';\n  sentences = Array.prototype.slice.call(document.querySelectorAll('.psg.active .para .body '+langSel+' > .s'));\n  document.querySelectorAll('.s').forEach(function(s){s.classList.remove('active','done');});\n}\n\nfunction togglePacer(){\n  pacerOn=!pacerOn;\n  document.body.classList.toggle('pacer',pacerOn);\n  var tb=document.getElementById('pacertoggle');\n  if(pacerOn){\n    tb.classList.remove('off');\n    tb.innerHTML='■ <span class=\"en\">Pacer: ON<\u002Fspan><span class=\"es\">Marcapasos: SÍ<\u002Fspan>';\n    document.querySelectorAll('.psg.active .para').forEach(function(el){el.classList.add('show');});\n    rebuildSentences(); idx=0; applyPace();\n  }else{\n    tb.classList.add('off');\n    tb.innerHTML='▸ <span class=\"en\">Reading Pacer<\u002Fspan><span class=\"es\">Marcapasos<\u002Fspan>';\n    document.querySelectorAll('.s').forEach(function(s){s.classList.remove('active','done');});\n  }\n}\n\nfunction applyPace(){\n  sentences.forEach(function(s,i){\n    s.classList.remove('active','done');\n    if(i<idx) s.classList.add('done');\n    if(i===idx) s.classList.add('active');\n  });\n  var cur=sentences[idx];\n  if(cur){\n    var r=cur.getBoundingClientRect();\n    var mid=window.innerHeight*0.42;\n    window.scrollBy({top:r.top-mid,behavior:'smooth'});\n  }\n  document.getElementById('pcount').textContent=(idx+1)+' / '+sentences.length;\n  document.getElementById('pprev').style.opacity = idx===0 ? '.35' : '1';\n  document.getElementById('pnext').style.opacity = idx>=sentences.length-1 ? '.35' : '1';\n}\nfunction paceNext(){ if(idx<sentences.length-1){idx++;applyPace();} }\nfunction pacePrev(){ if(idx>0){idx--;applyPace();} }\n\ndocument.addEventListener('keydown',function(e){\n  if(!pacerOn)return;\n  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' '){e.preventDefault();paceNext();}\n  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();pacePrev();}\n});\n\n/* ===================== REVEAL ON SCROLL ===================== */\nvar io=new IntersectionObserver(function(es){\n  es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('show'); io.unobserve(e.target);} });\n},{threshold:.18});\ndocument.querySelectorAll('.psg.active .para').forEach(function(el){io.observe(el);});\n\n/* ===================== PROGRESS BAR ===================== */\nwindow.addEventListener('scroll',function(){\n  var h=document.documentElement;\n  var pct=(h.scrollTop)/(h.scrollHeight-h.clientHeight)*100;\n  document.getElementById('prog').style.width=Math.min(100,pct)+'%';\n});\n\n/* ===================== VOCAB POPOVER ===================== */\nvar pop=document.getElementById('pop');\nfunction hidePop(){pop.style.display='none';}\nfunction showPop(el){\n  var key=el.getAttribute('data-k'); var g=GLOSS[key]; if(!g)return;\n  var d=g[lang];\n  pop.innerHTML='<span class=\"x\" onclick=\"hidePop()\">✕<\u002Fspan><div class=\"word\">'+d.w+'<\u002Fdiv>'+d.d;\n  pop.style.display='block';\n  var r=el.getBoundingClientRect();\n  var pw=pop.offsetWidth, ph=pop.offsetHeight;\n  var left=Math.min(window.innerWidth-pw-14, Math.max(14, r.left));\n  var top=r.bottom+10; if(top+ph>window.innerHeight){top=r.top-ph-10;}\n  pop.style.left=(left+window.scrollX)+'px'; pop.style.top=(top+window.scrollY)+'px';\n}\ndocument.addEventListener('click',function(e){\n  var t=e.target.closest('.term');\n  if(t){e.stopPropagation();showPop(t);}\n  else if(!e.target.closest('.pop')){hidePop();}\n});\ndocument.addEventListener('keydown',function(e){\n  if((e.key==='Enter'||e.key===' ')&&document.activeElement&&document.activeElement.classList.contains('term')){\n    e.preventDefault();showPop(document.activeElement);\n  }\n});\nwindow.addEventListener('scroll',hidePop);\n\n/* ===================== IMAGE LIGHTBOX ===================== */\nfunction openLight(fig){\n  var img=fig.querySelector('img'); if(!img)return;\n  var lb=document.getElementById('lightbox');\n  document.getElementById('lightimg').src=img.getAttribute('src');\n  document.getElementById('lightimg').alt=img.getAttribute('alt')||'';\n  lb.dataset.capEn=img.getAttribute('data-cap-en')||'';\n  lb.dataset.capEs=img.getAttribute('data-cap-es')||'';\n  updateLightCaption();\n  lb.classList.add('open');\n}\nfunction updateLightCaption(){\n  var lb=document.getElementById('lightbox');\n  document.getElementById('lightcap').textContent = lang==='es' ? (lb.dataset.capEs||'') : (lb.dataset.capEn||'');\n}\nfunction closeLight(){ document.getElementById('lightbox').classList.remove('open'); }\ndocument.addEventListener('keydown',function(e){\n  if(e.key==='Escape') closeLight();\n  if((e.key==='Enter'||e.key===' ')&&document.activeElement&&document.activeElement.classList.contains('figure')){\n    e.preventDefault();openLight(document.activeElement);\n  }\n});\n\n/* ===================== INIT ===================== */\nupdatePsgName();\nsyncPacerAvailability();\n<\u002Fscript>\n<script>\n(function(){\n  window.toggleLOSC=function(){\n    var p=document.getElementById('loscPop'),b=document.getElementById('loscPill');\n    if(!p)return; var o=p.classList.toggle('open'); if(b){b.classList.toggle('open',o);b.setAttribute('aria-expanded',o);}\n  };\n  document.addEventListener('click',function(e){\n    var p=document.getElementById('loscPop'); if(!p||!p.classList.contains('open'))return;\n    if(!p.contains(e.target)&&!e.target.closest('.losc-pill')){p.classList.remove('open');var b=document.getElementById('loscPill');if(b){b.classList.remove('open');b.setAttribute('aria-expanded','false');}}\n  });\n  document.querySelectorAll('.losc-ed[id]').forEach(function(el){\n    try{var v=localStorage.getItem(el.id); if(v!=null) el.innerHTML=v;}catch(e){}\n    el.addEventListener('input',function(){try{localStorage.setItem(el.id,el.innerHTML);}catch(e){}});\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
